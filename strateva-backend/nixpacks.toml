# Nixpacks build plan for Railway — pins Java 25 + Maven and starts the
# Spring Boot shaded jar directly. Keep in sync with pom.xml <java.version>.

[phases.setup]
nixPkgs = ["jdk25", "maven"]

[phases.build]
cmds = ["./mvnw -B -DskipTests package"]

[start]
cmd = "java -Dserver.port=$PORT -jar target/strava-backend-0.0.1-SNAPSHOT.jar"
